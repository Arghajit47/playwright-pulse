[pytest]
# Default options for pytest-pulse-report and pytest-playwright
addopts = 
    --pulse-report
    --pulse-output-dir=pulse-report 
    --pulse-description="Pulse E2E Validation Suite"
    --browser chromium 
    --screenshot on 
    --video on
    --tracing on
    --numprocesses 2

# Register custom markers to avoid warnings
markers =
    pulse_severity(level): set test severity (Minor/Low/Medium/High/Critical)
    pulse_tag(name): tag the test for filtering
    pulse_annotation(type, description): add custom annotation
    pulse_browser(name): override detected browser name
